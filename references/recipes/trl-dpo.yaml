# TRL DPO Preference Alignment
# Framework: TRL (Transformer Reinforcement Learning)
# Scale: Single GPU (A100/H100)
# Features: DPOTrainer, W&B logging, HF Hub push
#
# Usage:
#   sky jobs launch trl-dpo.yaml
#
# Prerequisites:
#   - WANDB_API_KEY in local env
#   - HF_TOKEN in local env (write access for model push)
#   - SFT model already trained (or use base instruct model)

name: trl-dpo-alignment

resources:
  accelerators: A100:1
  use_spot: true
  disk_size: 256
  disk_tier: high
  any_of:
    - cloud: aws
    - cloud: gcp
    - cloud: lambda

envs:
  WANDB_API_KEY: null
  HF_TOKEN: null
  MODEL_ID: meta-llama/Meta-Llama-3.1-8B-Instruct
  DATASET_NAME: argilla/ultrafeedback-binarized-preferences
  OUTPUT_DIR: /checkpoints/dpo
  HF_PUSH_REPO: YOUR_ORG/llama3-8b-dpo
  NUM_EPOCHS: 1
  LEARNING_RATE: "5e-7"
  BETA: "0.1"
  BATCH_SIZE: 2
  GRADIENT_ACCUM: 4
  MAX_LENGTH: 2048
  MAX_PROMPT_LENGTH: 1024

file_mounts:
  /checkpoints:
    source: s3://YOUR_BUCKET/checkpoints/dpo
    mode: MOUNT

setup: |
  pip install --upgrade pip
  pip install \
    trl>=0.12.0 \
    transformers>=4.46.0 \
    accelerate \
    datasets \
    peft \
    bitsandbytes \
    wandb \
    flash-attn

  python -c "import torch; print(f'GPU: {torch.cuda.get_device_name(0)}, VRAM: {torch.cuda.get_device_properties(0).total_mem / 1e9:.1f} GB')"

run: |
  #!/bin/bash
  set -euo pipefail

  echo "=== TRL DPO Alignment ==="
  echo "Model: ${MODEL_ID}"
  echo "Dataset: ${DATASET_NAME}"
  echo "Beta: ${BETA}, LR: ${LEARNING_RATE}"

  python - <<'PYTHON_EOF'
  import os
  import torch
  from datasets import load_dataset
  from transformers import AutoModelForCausalLM, AutoTokenizer, BitsAndBytesConfig
  from peft import LoraConfig
  from trl import DPOTrainer, DPOConfig

  model_id = os.environ["MODEL_ID"]
  dataset_name = os.environ["DATASET_NAME"]
  output_dir = os.environ["OUTPUT_DIR"]
  hf_push_repo = os.environ.get("HF_PUSH_REPO", "")

  # Quantization for memory efficiency
  bnb_config = BitsAndBytesConfig(
      load_in_4bit=True,
      bnb_4bit_quant_type="nf4",
      bnb_4bit_compute_dtype=torch.bfloat16,
      bnb_4bit_use_double_quant=True,
  )

  # Load model and tokenizer
  print(f"Loading model: {model_id}")
  model = AutoModelForCausalLM.from_pretrained(
      model_id,
      quantization_config=bnb_config,
      torch_dtype=torch.bfloat16,
      attn_implementation="flash_attention_2",
      device_map="auto",
  )

  tokenizer = AutoTokenizer.from_pretrained(model_id)
  if tokenizer.pad_token is None:
      tokenizer.pad_token = tokenizer.eos_token

  # LoRA config for DPO
  peft_config = LoraConfig(
      r=16,
      lora_alpha=32,
      lora_dropout=0.05,
      target_modules=["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"],
      bias="none",
      task_type="CAUSAL_LM",
  )

  # Load preference dataset
  print(f"Loading dataset: {dataset_name}")
  dataset = load_dataset(dataset_name, split="train")

  # DPO config
  dpo_config = DPOConfig(
      output_dir=output_dir,
      num_train_epochs=int(os.environ["NUM_EPOCHS"]),
      per_device_train_batch_size=int(os.environ["BATCH_SIZE"]),
      gradient_accumulation_steps=int(os.environ["GRADIENT_ACCUM"]),
      learning_rate=float(os.environ["LEARNING_RATE"]),
      beta=float(os.environ["BETA"]),
      max_length=int(os.environ["MAX_LENGTH"]),
      max_prompt_length=int(os.environ["MAX_PROMPT_LENGTH"]),
      bf16=True,
      logging_steps=5,
      save_steps=200,
      save_total_limit=3,
      eval_strategy="steps",
      eval_steps=200,
      warmup_ratio=0.1,
      optim="adamw_bnb_8bit",
      gradient_checkpointing=True,
      gradient_checkpointing_kwargs={"use_reentrant": False},
      report_to="wandb",
      run_name=f"dpo-{model_id.split('/')[-1]}",
  )

  # Train
  trainer = DPOTrainer(
      model=model,
      args=dpo_config,
      train_dataset=dataset,
      processing_class=tokenizer,
      peft_config=peft_config,
  )

  print("Starting DPO training...")
  trainer.train()
  trainer.save_model(output_dir)
  tokenizer.save_pretrained(output_dir)

  # Push to HF Hub
  if hf_push_repo and hf_push_repo != "YOUR_ORG/llama3-8b-dpo":
      print(f"Pushing to HF Hub: {hf_push_repo}")
      trainer.push_to_hub(hf_push_repo)

  print("DPO alignment complete!")
  PYTHON_EOF

  echo "=== DPO complete ==="
  echo "Model saved to: ${OUTPUT_DIR}"
